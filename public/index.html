<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roblox Telemetry Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="layout">
      <section class="card hero">
        <h1>Roblox Telemetry Analytics</h1>
        <p>
          Pull from DataStore, decode IDs/timestamps into readable labels, and watch trends for balancing and economy analysis.
        </p>
        <div class="row actions">
          <button id="syncBtn">Sync Now</button>
          <span id="syncStatus" class="status">Idle</span>
        </div>
      </section>

      <section class="card stats" id="overview"></section>

      <section class="card controls">
        <div>
          <label for="metricSelect">Trend Metric</label>
          <select id="metricSelect"></select>
        </div>
        <div>
          <label for="bucketSelect">Time Bucket</label>
          <select id="bucketSelect">
            <option value="day">Day</option>
            <option value="week">Week</option>
            <option value="month">Month</option>
          </select>
        </div>
        <div>
          <label for="topFieldSelect">Top Grouping Field</label>
          <select id="topFieldSelect"></select>
        </div>
      </section>

      <section class="card chart-card">
        <h2>Trend</h2>
        <canvas id="trendChart"></canvas>
      </section>

      <section class="card chart-card">
        <h2>Top Categories</h2>
        <canvas id="topChart"></canvas>
      </section>

      <section class="card table-card">
        <h2>Recent Normalized Entries</h2>
        <div class="table-wrap">
          <table id="entriesTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="/main.js"></script>
  </body>
</html>
