name: telemetry-analytics
region: nyc

services:
  - name: web
    github:
      repo: Anders-Brodd/MA-Player-Data
      branch: main
      deploy_on_push: true
    dockerfile_path: ./Dockerfile
    source_dir: /
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
        type: general
      - key: PORT
        value: "8080"
        scope: RUN_TIME
        type: general
      - key: ROBLOX_API_KEY
        value: your-roblox-open-cloud-key
        scope: RUN_TIME
        type: secret
      - key: ROBLOX_UNIVERSE_ID
        value: your-roblox-universe-id
        scope: RUN_TIME
        type: general
      - key: ROBLOX_DATASTORE_NAME
        value: your-roblox-datastore-name
        scope: RUN_TIME
        type: general